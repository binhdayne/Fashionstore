<div class="payment-method fashionstore-payment-method"
     data-bind="css: getCssClasses()">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()" />
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span class="fashionstore-payment-card">
                <span class="fashionstore-payment-card__icon">
                    <img data-bind="attr: {src: getLogoUrl(), alt: getTitle()}" />
                </span>
                <span class="fashionstore-payment-card__copy">
                    <span class="fashionstore-payment-card__head">
                        <span class="fashionstore-payment-card__title" data-bind="text: getTitle()"></span>
                        <span class="fashionstore-payment-card__badge" data-bind="text: getBadge()"></span>
                    </span>
                    <span class="fashionstore-payment-card__description" data-bind="text: getDescription()"></span>
                </span>
            </span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="button"
                        data-bind="click: placeOrder, attr: {title: getButtonTitle()}, css: {disabled: !isPlaceOrderActionAllowed()}, enable: (getCode() == isChecked() && !isPreparingTransfer())"
                        disabled>
                    <span data-bind="text: getButtonTitle()"></span>
                </button>
            </div>
        </div>
        <div class="fashionstore-zalopay-inline-status" data-bind="visible: statusMessage">
            <span data-bind="text: statusMessage"></span>
        </div>
    </div>

    <div class="fashionstore-zalopay-modal fashionstore-banktransfer-modal" data-bind="css: {'is-visible': isModalVisible}, visible: isModalVisible">
        <div class="fashionstore-zalopay-modal__backdrop" data-bind="click: handleOverlayClose"></div>
        <div class="fashionstore-zalopay-modal__dialog" role="dialog" aria-modal="true" aria-label="Thanh toan chuyen khoan QR">
            <div class="fashionstore-zalopay-modal__content fashionstore-banktransfer-modal__content">
                <button type="button" class="fashionstore-zalopay-modal__close" data-bind="click: handleOverlayClose" aria-label="Dong">
                    <span>×</span>
                </button>
                <p class="fashionstore-zalopay-modal__intro">Quet ma QR duoi day de chuyen khoan. Sau khi thanh toan, tai len anh minh chung de shop doi soat.</p>
                <p class="fashionstore-zalopay-modal__amount" data-bind="visible: amountLabel">
                    So tien can thanh toan: <strong data-bind="text: amountLabel"></strong>
                </p>
                <div class="fashionstore-zalopay-modal__qr" data-bind="if: qrImageUrl">
                    <img data-bind="attr: {src: qrImageUrl, alt: 'QR chuyen khoan'}" />
                </div>
                <div class="fashionstore-banktransfer-modal__meta">
                    <p>Ma don hang: <strong data-bind="text: orderIncrementId"></strong></p>
                    <p>Vui long ghi dung ma don hang khi chuyen khoan de shop doi soat nhanh hon.</p>
                </div>
                <div class="fashionstore-banktransfer-upload">
                    <label class="fashionstore-banktransfer-upload__label" for="fashionstore-banktransfer-proof">Tai len anh bien lai / man hinh chuyen khoan</label>
                    <input id="fashionstore-banktransfer-proof"
                           class="fashionstore-banktransfer-upload__input"
                           type="file"
                           accept="image/*"
                           data-bind="event: { change: handleFileSelection }" />
                    <p class="fashionstore-banktransfer-upload__filename" data-bind="visible: proofFileName">
                        Tep da chon: <strong data-bind="text: proofFileName"></strong>
                    </p>
                    <textarea class="fashionstore-banktransfer-upload__note"
                              rows="3"
                              placeholder="Ghi chu them cho giao dich neu can"
                              data-bind="value: proofNote"></textarea>
                </div>
                <div class="fashionstore-zalopay-modal__actions fashionstore-banktransfer-modal__actions">
                    <button type="button" class="action primary" data-bind="click: uploadProof, enable: (proofFileName() && !isUploadingProof())">
                        <span data-bind="text: isUploadingProof() ? 'Dang tai len...' : 'Tai len minh chung'"></span>
                    </button>
                    <button type="button" class="action secondary" data-bind="click: goToSuccessPage, visible: redirectUrl">
                        <span>Toi trang xac nhan</span>
                    </button>
                </div>
                <div class="fashionstore-banktransfer-upload__preview" data-bind="visible: uploadedProofUrl">
                    <p>Minh chung da tai len:</p>
                    <img data-bind="attr: {src: uploadedProofUrl, alt: 'Minh chung chuyen khoan'}" />
                </div>
                <p class="fashionstore-zalopay-modal__status" data-bind="text: statusMessage"></p>
            </div>
        </div>
    </div>
</div>
