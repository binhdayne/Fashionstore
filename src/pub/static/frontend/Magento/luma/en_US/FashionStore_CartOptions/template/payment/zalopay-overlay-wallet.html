<div class="payment-method fashionstore-payment-method"
     data-bind="css: getCssClasses()">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()" />
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span class="fashionstore-payment-card">
                <span class="fashionstore-payment-card__icon">
                    <img data-bind="attr: {src: getLogoUrl(), alt: getTitle()}" />
                </span>
                <span class="fashionstore-payment-card__copy">
                    <span class="fashionstore-payment-card__head">
                        <span class="fashionstore-payment-card__title" data-bind="text: getTitle()"></span>
                        <span class="fashionstore-payment-card__badge" data-bind="text: getBadge()"></span>
                    </span>
                    <span class="fashionstore-payment-card__description" data-bind="text: getDescription()"></span>
                </span>
            </span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="button"
                        data-bind="click: placeOrder, attr: {title: getButtonTitle()}, css: {disabled: !isPlaceOrderActionAllowed()}, enable: (getCode() == isChecked() && !isCreatingOrder())"
                        disabled>
                    <span data-bind="text: getButtonTitle()"></span>
                </button>
            </div>
        </div>
        <div class="fashionstore-zalopay-inline-status" data-bind="visible: statusMessage">
            <span data-bind="text: statusMessage"></span>
        </div>
    </div>

    <div class="fashionstore-zalopay-modal" data-bind="css: {'is-visible': isModalVisible}, visible: isModalVisible">
        <div class="fashionstore-zalopay-modal__backdrop" data-bind="click: handleOverlayClose"></div>
        <div class="fashionstore-zalopay-modal__dialog" role="dialog" aria-modal="true" aria-label="Thanh toan ZaloPay">
            <div class="fashionstore-zalopay-modal__content">
                <button type="button" class="fashionstore-zalopay-modal__close" data-bind="click: handleOverlayClose" aria-label="Dong">
                    <span>×</span>
                </button>
                <p class="fashionstore-zalopay-modal__intro">Quet ma QR bang ung dung ZaloPay de hoan tat thanh toan.</p>
                <div class="fashionstore-zalopay-modal__qr" data-bind="if: qrImageUrl">
                    <img data-bind="attr: {src: qrImageUrl, alt: 'ZaloPay QR'}" />
                </div>
                <div class="fashionstore-zalopay-modal__actions">
                    <a class="action primary" target="_blank" rel="noopener noreferrer" data-bind="attr: {href: gatewayUrl}, visible: gatewayUrl">
                        <span>Mo cong thanh toan</span>
                    </a>
                    <button type="button" class="action secondary" data-bind="click: queryPaymentStatus">
                        <span>Kiem tra trang thai</span>
                    </button>
                </div>
                <p class="fashionstore-zalopay-modal__note" data-bind="visible: isPolling">He thong dang tu dong truy van lai trang thai sau moi 1 phut.</p>
                <p class="fashionstore-zalopay-modal__status" data-bind="text: statusMessage"></p>
            </div>
        </div>
    </div>
</div>
