<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Management – Đăng nhập</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      color: #fff;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      font-size: 32px;
      margin-bottom: 6px;
    }

    h2 {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #e2e8f0;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #94a3b8;
      transition: all 0.25s;
    }
    .tab.active {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 2px 10px rgba(59,130,246,0.4);
    }

    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus, select:focus {
      border-color: #3b82f6;
    }
    input::placeholder { color: #64748b; }
    select option { background: #1e293b; color: #fff; }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      text-align: center;
      display: none;
    }
    .message.success { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
    .message.error   { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3);  }

    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛍️</div>
  <h2>Shop Management</h2>
  <p class="subtitle">Quản lý cửa hàng thông minh</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Đăng nhập</div>
    <div class="tab" onclick="switchTab('register')">Đăng ký</div>
  </div>

  <!-- ĐĂNG NHẬP -->
  <div id="loginSection" class="form-section active">
    <label>Tên đăng nhập</label>
    <input type="text" id="loginUsername" placeholder="Nhập username..." />

    <label>Mật khẩu</label>
    <input type="password" id="loginPassword" placeholder="Nhập mật khẩu..." />

    <button onclick="handleLogin()">Đăng nhập →</button>
    <div id="loginMsg" class="message"></div>
  </div>

  <!-- ĐĂNG KÝ -->
  <div id="registerSection" class="form-section">
    <label>Tên đăng nhập</label>
    <input type="text" id="regUsername" placeholder="Nhập username..." />

    <label>Mật khẩu</label>
    <input type="password" id="regPassword" placeholder="Nhập mật khẩu..." />

    <label>Số điện thoại</label>
    <input type="text" id="regPhone" placeholder="Nhập số điện thoại..." />

    <label>Địa chỉ</label>
    <input type="text" id="regAddress" placeholder="Nhập địa chỉ..." />

    <button onclick="handleRegister()">Tạo tài khoản</button>
    <div id="registerMsg" class="message"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((el, i) => {
      el.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('registerSection').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `message ${type}`;
    el.style.display = 'block';
  }

  async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();

    if (!username || !password) {
      return showMsg('loginMsg', 'Vui lòng nhập đầy đủ thông tin.', 'error');
    }

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        // Lưu thông tin người dùng vào sessionStorage
        sessionStorage.setItem('user', JSON.stringify(data.data));
        showMsg('loginMsg', `✅ Chào ${data.data.username}! Đang chuyển trang...`, 'success');

        // Chuyển sang trang chính sau 1 giây
        setTimeout(() => {
          window.location.href = data.data.role === 'customer' ? '/customer-dashboard.html' : '/dashboard.html';
        }, 1000);
      } else {
        showMsg('loginMsg', data.message || 'Đăng nhập thất bại.', 'error');
      }
    } catch (e) {
      showMsg('loginMsg', 'Không kết nối được server.', 'error');
    }
  }

  async function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value.trim();
    const phone_number = document.getElementById('regPhone').value.trim();
    const address  = document.getElementById('regAddress').value.trim();
    const role = 'customer'; // Đăng ký mặc định là khách hàng

    if (!username || !password) {
      return showMsg('registerMsg', 'Vui lòng nhập đầy đủ username và password.', 'error');
    }

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, phone_number, address, role })
      });
      const data = await res.json();

      if (data.success) {
        showMsg('registerMsg', '✅ Đăng ký thành công! Hãy đăng nhập.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showMsg('registerMsg', data.message || 'Đăng ký thất bại.', 'error');
      }
    } catch (e) {
      showMsg('registerMsg', 'Không kết nối được server.', 'error');
    }
  }

  // Cho phép nhấn Enter để submit
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('loginSection').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
